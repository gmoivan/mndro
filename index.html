<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mndro.org</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: #fffaf2;
      --text: #1f1a17;
      --muted: #6a5f57;
      --accent: #b6542b;
      --border: #d7c7b6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(182, 84, 43, 0.14), transparent 40%),
        linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 88%, white);
      box-shadow: 0 24px 60px rgba(63, 38, 20, 0.08);
    }

    p {
      margin: 0;
      line-height: 1.6;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .copy {
      color: var(--muted);
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Placeholder</p>
    <h1>mndro.org</h1>
    <p class="copy">This domain is live and currently serving a temporary holding page.</p>
  </main>
</body>
</html>
